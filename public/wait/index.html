<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark">
<title>—</title>
<link rel="stylesheet" href="/common.css">

<style>
::selection { background: #3a3632; color: #b5b0ab; }
::-moz-selection { background: #3a3632; color: #b5b0ab; }
</style>
</head>
<body>
<div class="p">
  <div id="before" class="c">
    <p>It's not time yet.</p>
    <p>Some things open only when the light is right.</p>
  </div>
  <div id="after" class="c" style="display:none">
    <p>The window was brief.</p>
    <p>You caught it or you did not.</p>
  </div>
  <script>
(function(){
  var h = new Date().getHours();
  var unlock = 18; // 6pm
  if (h >= unlock) {
    document.getElementById('before').style.display = 'none';
    document.getElementById('after').style.display = '';
  }
})();
</script>
</div>

</body>
</html>
